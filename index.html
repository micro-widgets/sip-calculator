<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP Calculator - Calculate Your Investment Returns</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="calculator-wrapper">
            <div class="header">
                <h1>SIP Calculator</h1>
                <p>Calculate your Systematic Investment Plan returns</p>
            </div>

            <form id="sipForm" class="form">
                <div class="form-group">
                    <label for="monthlyInvestment">Monthly Investment Amount (₹)</label>
                    <input 
                        type="number" 
                        id="monthlyInvestment" 
                        placeholder="Enter amount" 
                        min="0" 
                        step="100"
                        value="10000"
                        required
                    >
                    <span class="input-hint">Minimum ₹100</span>
                </div>

                <div class="form-group">
                    <label for="returnRate">Expected Annual Return Rate (%)</label>
                    <input 
                        type="number" 
                        id="returnRate" 
                        placeholder="Enter percentage" 
                        min="0" 
                        max="100"
                        step="0.1"
                        value="12"
                        required
                    >
                    <span class="input-hint">Typical range: 8% - 20%</span>
                </div>

                <div class="form-group">
                    <label>Time Period</label>
                    <div class="time-period-group">
                        <div class="time-input">
                            <label for="timePeriod">Duration</label>
                            <input 
                                type="number" 
                                id="timePeriod" 
                                placeholder="Enter value" 
                                min="1" 
                                step="1"
                                value="5"
                                required
                            >
                        </div>
                        <div class="time-unit">
                            <label for="timeUnit">Unit</label>
                            <select id="timeUnit" required>
                                <option value="years">Years</option>
                                <option value="months">Months</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" class="calculate-btn">Calculate</button>
            </form>

            <div id="results" class="results hidden">
                <div class="results-grid">
                    <div class="result-card">
                        <div class="result-label">Total Investment</div>
                        <div class="result-value" id="totalInvestment">₹0</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Expected Returns</div>
                        <div class="result-value gains" id="expectedReturns">₹0</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Maturity Amount</div>
                        <div class="result-value total" id="maturityAmount">₹0</div>
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="resultChart"></canvas>
                </div>

                <div class="breakdown">
                    <h3>Investment Breakdown</h3>
                    <div class="breakdown-item">
                        <span>Monthly Investment:</span>
                        <span id="breakdownMonthly">₹0</span>
                    </div>
                    <div class="breakdown-item">
                        <span>Number of Months:</span>
                        <span id="breakdownMonths">0</span>
                    </div>
                    <div class="breakdown-item">
                        <span>Annual Return Rate:</span>
                        <span id="breakdownRate">0%</span>
                    </div>
                </div>
            </div>

            <div id="error" class="error-message hidden"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
