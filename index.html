<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible SIP Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <h2>SIP Calculator</h2>
        
        <div class="input-group">
            <label for="monthlyInstalment">Monthly Investment (₹)</label>
            <input type="number" id="monthlyInstalment" value="25000" min="500">
        </div>

        <div class="input-group">
            <label for="expectedReturn">Expected Return Rate (% per annum)</label>
            <input type="number" id="expectedReturn" value="12" step="0.1" min="1" max="30">
        </div>

        <!-- NEW: Flexible Time Group -->
        <div class="input-group">
            <label for="timePeriod">Time Period</label>
            <div class="flexible-time-input">
                <input type="number" id="timePeriod" value="10" min="1">
                <select id="timeUnit" onchange="calculateSIP()">
                    <option value="years" selected>Years</option>
                    <option value="months">Months</option>
                </select>
            </div>
        </div>

        <button onclick="calculateSIP()">Calculate Returns</button>

        <hr>

        <div class="results">
            <p>Total Invested Amount: <strong id="totalInvested">₹0</strong></p>
            <p>Estimated Wealth Gained: <strong id="wealthGained">₹0</strong></p>
            <p>Total Future Value: <strong id="futureValue" class="highlight">₹0</strong></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
